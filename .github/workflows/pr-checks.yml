name: PR Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test -- --watchman=false

      - name: Build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder-auth-domain
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder-project-id
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder-storage-bucket
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ci-placeholder-sender-id
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder-app-id
          NEXT_TELEMETRY_DISABLED: "1"
        run: pnpm build
